<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tienda de Ropa</title>
  <link rel="stylesheet" href="login.css">
  <script src="login.js"></script>
  
</head>
<body>
  <header>
    <img src="img/veloura.svg" alt="veloura" width="300px">
    <h1>Inicio de sesión</h1>
  </header>

  <main>
    <section class="login-box">
      <h2>Acceso al sistema</h2>

      <form id="loginForm">
        <label>Nombre y apellido: </label>
        <input type="text" id="usuario" placeholder="Ej: admin" required>

        <label>Rol: </label>
        <select id="rol" required>
          <option value="">Seleccione un rol</option>
          <option value="admin">Administrador</option>
          <option value="vendedor">Vendedor</option>
        </select>
        
        <label>Correo electrónico: </label>
        <input type="email" id="email" placeholder="Ej: admin@veloura.com" required>

        <label>Contraseña:</label>
        <input type="password" id="password" required>
    
        <button type="submit">Ingresar</button>
    </form>

     
    </section>
  </main>

  <footer>
    <p>© 2026 veloura<br>veloura@gmail.com</p>
  </footer>
</body>
</html>
