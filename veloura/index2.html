<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Vendedor - Tienda de Ropa</title>
  <link rel="stylesheet" href="index.css">
  <script defer src="productos.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <img src="img/veloura.svg" alt="veloura" height="80px">
      <nav>
        <a href="#">Inicio</a>
        <a href="#Productos">Productos</a>
        <a href="#Contacto">Contacto</a>
      </nav>
      <button id="btn-carrito-header" class="btn-carrito-header">
         Carrito <span id="contador-carrito" class="contador-carrito">0</span>
      </button>
    </div>
  </header>

  <main>
    <section>
      <h2>Gestión de Productos</h2>

      <form id="formProductoAgregar">
        <input type="hidden" id="editingId">
        <label>Nombre del producto:</label>
        <input type="text" id="nombre" required>

        <label>Precio:</label>
        <input type="number" id="precio" step="0.01" required>

        <label>Stock:</label>
        <input type="number" id="stock" min="0" step="1" required>

        <label>Descripción:</label>
        <textarea id="descripcion" rows="3" required></textarea>

        <label>Imagen (URL):</label>
        <input type="text" id="imagen" placeholder="Ruta o URL de la imagen" required>

        <button id="submitProducto" type="submit">Agregar producto</button>
      </form>
    </section>

    <section>
      <h3>Productos añadidos</h3>
      <table id="tablaProductosVendedor">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Imagen</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>© 2025 87wear<br>87wear@gmail.com</p>
  </footer>
</body>
</html>
